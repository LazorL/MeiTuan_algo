<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加品类 - Online Order OvO</title>
    <link rel="stylesheet" href="css/add-category.css">
</head>
<body>
    <div class="add-category-container">
        <div class="add-category-card">
            <div class="card-header">
                <h1>➕ 添加新品类</h1>
                <p class="subtitle">通过 API 将品类写入后端 MySQL</p>
            </div>

            <form id="addCategoryForm" onsubmit="handleAddCategory(event)">
                <div class="form-group">
                    <label for="categoryIcon">品类图标 <span class="required">*</span></label>
                    <div class="icon-selector">
                        <input type="text" id="categoryIcon" placeholder="输入emoji或符号，如：🍜" maxlength="10" required>
                        <div class="icon-preview" id="iconPreview">🍽️</div>
                    </div>
                    <div class="common-icons">
                        <span class="common-icon" onclick="selectIcon('🦐')">🦐</span>
                        <span class="common-icon" onclick="selectIcon('🐟')">🐟</span>
                        <span class="common-icon" onclick="selectIcon('🐷')">🐷</span>
                        <span class="common-icon" onclick="selectIcon('🍗')">🍗</span>
                        <span class="common-icon" onclick="selectIcon('🥬')">🥬</span>
                        <span class="common-icon" onclick="selectIcon('🍜')">🍜</span>
                        <span class="common-icon" onclick="selectIcon('🍲')">🍲</span>
                        <span class="common-icon" onclick="selectIcon('🥘')">🥘</span>
                        <span class="common-icon" onclick="selectIcon('🍱')">🍱</span>
                        <span class="common-icon" onclick="selectIcon('🍛')">🍛</span>
                        <span class="common-icon" onclick="selectIcon('🍝')">🍝</span>
                        <span class="common-icon" onclick="selectIcon('🥟')">🥟</span>
                        <span class="common-icon" onclick="selectIcon('🌮')">🌮</span>
                        <span class="common-icon" onclick="selectIcon('🥗')">🥗</span>
                        <span class="common-icon" onclick="selectIcon('🍖')">🍖</span>
                        <span class="common-icon" onclick="selectIcon('🥩')">🥩</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="categoryName">品类名称 <span class="required">*</span></label>
                    <input type="text" id="categoryName" placeholder="例如：烧烤、汤品、甜品" required maxlength="20">
                    <div class="char-count">
                        <span id="charCount">0</span>/20
                    </div>
                </div>

                <div class="form-group">
                    <label for="categoryDescription">品类描述</label>
                    <textarea id="categoryDescription" placeholder="例如：各式热汤，滋补养生" maxlength="100" rows="3"></textarea>
                    <div class="char-count">
                        <span id="descCount">0</span>/100
                    </div>
                </div>

                <div class="form-group">
                    <label for="categoryOrder">显示顺序</label>
                    <input type="number" id="categoryOrder" placeholder="数字越小越靠前，默认为最后" min="0" value="">
                </div>

                <div class="form-group">
                    <label for="categoryColor">品类颜色（可选）</label>
                    <div class="color-selector">
                        <input type="color" id="categoryColor" value="#ff9800">
                        <div class="color-preview" id="colorPreview"></div>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn-cancel" onclick="goBack()">返回</button>
                    <button type="submit" class="btn-submit">添加品类</button>
                </div>
            </form>

            <div class="existing-categories">
                <h2>已有品类</h2>
                <div class="categories-list" id="categoriesList"></div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/add-category.js"></script>
</body>
</html>
